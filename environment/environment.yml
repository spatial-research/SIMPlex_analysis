# Conda: R + system libraries. R packages: environment/renv.lock (bash environment/setup.sh)
name: simplex
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base=4.3.3
  - r-irkernel
  - libarrow=18.1
  - pyarrow=18.1
  - python=3.12
  - pip
  - compilers
  - cmake
  - make
  - pkg-config
  - libxml2
  - curl
  - openssl
  - hdf5
  - libgit2
  - cairo
  - harfbuzz
  - freetype
  - geos
  - gdal
  - proj
  - libpng
  - jpeg
  - zlib
  - xz
  - zeromq
  - pip:
      - loompy
