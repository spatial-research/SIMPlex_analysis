# Conda: R + system libraries. R packages: environment/renv.lock
# SpaGE (spatial imputation): environment/spage.lock.json + environment/install_spage.sh
# Full stack: bash environment/setup.sh
name: simplex
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base=4.3.3
  - r-irkernel
  - libarrow=18.1
  - pyarrow=18.1
  - python=3.12
  - pip
  - git
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.0
  - scikit-learn=1.5.0
  - compilers
  - cmake
  - make
  - pkg-config
  - libxml2
  - curl
  - openssl
  - hdf5
  - libgit2
  - cairo
  - harfbuzz
  - freetype
  - geos
  - gdal
  - proj
  - libpng
  - jpeg
  - zlib
  - xz
  - zeromq
  - pip:
      - loompy
