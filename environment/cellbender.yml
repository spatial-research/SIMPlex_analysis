# CellBender v0.3.0 — manuscript stack (see docs/data_availability.md).
# Cannot be merged into environment/environment.yml: CellBender 0.3.0 requires Python 3.7
# and PyTorch 1.13.x with CUDA; the main simplex env uses Python 3.12 for Seurat/R.
#
#   conda env create -f environment/cellbender.yml
#   conda activate simplex-cellbender
#
name: simplex-cellbender
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.7.*
  - pytables
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu117
      - torch==1.13.1+cu117
      - torchvision==0.14.1+cu117
      - torchaudio==0.13.1+cu117
      - cellbender==0.3.0
